<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Matteo & Sebiana — 1 settembre 2026</title>
  <meta name="description" content="Informazioni per gli invitati — Matrimonio di Matteo e Sebiana, 1 settembre 2026." />
  <meta name="theme-color" content="#4E8C78" />

  <style>
    :root{
      --sage:#4E8C78;
      --sage2:#2F6E5B;
      --cream:#FFF7EE;
      --white:#FFFFFF;

      --text:#22302A;
      --muted:#5E6B64;
      --border:rgba(34,48,42,.12);

      --radius:22px;
      --shadow:0 18px 40px rgba(0,0,0,.09);
      --max:980px;

      --serif: ui-serif, "Georgia", "Times New Roman", serif;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      color:var(--text);
      font-family:var(--sans);
      background:
        radial-gradient(900px 400px at 15% 0%, rgba(78,140,120,.18), transparent 55%),
        radial-gradient(900px 400px at 90% 10%, rgba(242,226,207,.55), transparent 55%),
        linear-gradient(180deg, var(--cream), var(--white) 40%, #ffffff 100%);
    }

    .wrap{ max-width:var(--max); margin:0 auto; padding:0 18px; }

    /* Header */
    header{ padding:90px 0 40px; text-align:center; }
    .name-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
    }

    h1{
      margin:0;
      font-family:var(--serif);
      font-style:italic;
      font-weight:800;
      letter-spacing:1px;
      font-size:56px;
      line-height:1.05;
    }

    .subtitle{
      margin:12px 0 0;
      color:var(--sage2);
      font-size:22px;
      letter-spacing:.8px;
      font-weight:800;
      text-align:center;
    }

    @media (max-width:520px){
      header{ padding:78px 0 34px; }
      h1{ font-size:46px; }
      .subtitle{ font-size:20px; }
    }

    /* ✅ Sticker PNG (trasparenti, senza box) */
    .avatar{
      width:86px;
      height:auto;
      display:block;
      background:transparent;
      padding:0;
      border:none;
      outline:none;
      filter: drop-shadow(0 10px 22px rgba(0,0,0,.14));
    }

    @media (max-width:520px){
      .avatar{ width:70px; }
    }

    /* Cards */
    section{ padding:26px 0; }
    .card{
      background:rgba(255,255,255,.94);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:0 18px 40px rgba(0,0,0,.09);
      padding:26px;
    }

    .stack{ display:grid; gap:18px; }

    .title{
      display:flex;
      align-items:center;
      gap:12px;
      margin:0 0 12px;
      font-family:var(--serif);
      font-size:22px;
    }

    .ico{
      width:46px;
      height:46px;
      stroke:var(--sage);
      fill:rgba(78,140,120,.18);
      stroke-width:2.6;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.14));
    }

    p{ line-height:1.7; font-size:14.7px; }

    footer{
      text-align:center;
      padding:56px 18px 64px;
      color:var(--muted);
    }
  </style>
</head>

<body>

  <header>
    <div class="wrap">
      <div class="name-row">

        <!-- ✅ PNG SPOSO -->
        <img src="assets/matteo.png" alt="Matteo" class="avatar">

        <h1>Matteo &amp; Sebiana</h1>

        <!-- ✅ PNG SPOSA -->
        <img src="assets/sebiana.png" alt="Sebiana" class="avatar">

      </div>

      <p class="subtitle">01.09.2026</p>
    </div>
  </header>

  <main class="wrap">
    <section class="stack">
      <div class="card">
        <div class="title">Benvenuti</div>
        <p>Siamo felici di condividere con voi questo giorno speciale.</p>
      </div>
    </section>
  </main>

  <footer>
    <p class="finale">Non vediamo l’ora di condividere questo giorno con voi.</p>
    <small>Matteo &amp; Sebiana · 01.09.2026</small>
  </footer>

</body>
</html>
